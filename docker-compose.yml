services:
  postgres:
    image: postgres:16-alpine
    container_name: loteria-postgres
    restart: unless-stopped
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${DB_USER:-loteria}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-loteria}
      POSTGRES_DB: ${DB_NAME:-loteria}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-loteria} -d ${DB_NAME:-loteria}"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
    name: loteria_postgres_data
